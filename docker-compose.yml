services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: pulseiq
      POSTGRES_PASSWORD: pulseiq123
      POSTGRES_DB: pulseiq_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://pulseiq:pulseiq123@db:5432/pulseiq_db

volumes:
  pgdata: